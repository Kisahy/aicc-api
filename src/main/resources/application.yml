# =============================================================
# aicc-api — Spring Boot 공통 설정
# =============================================================

spring:
  application:
    name: aicc-api

  profiles:
    # 기본 프로필 — 실행 시 --spring.profiles.active=prod 로 변경
    active: local

  # ── JPA ─────────────────────────────────────────────────────
  jpa:
    hibernate:
      # 운영에서는 절대 update/create 사용 금지.
      # 스키마는 aicc-infra 의 DDL 로만 관리. 여기서는 validate 만.
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul
    open-in-view: false    # OSIV 비활성 (운영 표준)

  jackson:
    time-zone: Asia/Seoul
    date-format: yyyy-MM-dd'T'HH:mm:ss
    default-property-inclusion: non_null

# ── 서버 ──────────────────────────────────────────────────────
server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

# ── 로깅 ──────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.kisahy.aicc: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE   # SQL 바인딩 파라미터 로그

# ── Swagger / OpenAPI ─────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  default-produces-media-type: application/json

# ── 커스텀: JWT ───────────────────────────────────────────────
aicc:
  jwt:
    # ⚠️  운영 환경에서는 반드시 환경변수로 주입 (application-prod.yml 에서 override)
    secret: "dev-secret-key-change-me-in-production-at-least-32-bytes-long!!"
    access-token-expiration-ms:  3600000      # 1시간
    refresh-token-expiration-ms: 1209600000   # 14일
    issuer: "aicc-api"
